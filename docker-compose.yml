services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8080/auth/callback}
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_PATH=/app/data/app.db
      - PORT=8080
      - HOST=0.0.0.0
    volumes:
      - data:/app/data

volumes:
  data:
